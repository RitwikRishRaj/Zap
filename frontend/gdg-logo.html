<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GDG Logo Animation</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0e0e0e;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Google Sans', sans-serif;
    overflow: hidden;
  }

  .stage {
    position: relative;
    width: 340px;
    height: 220px;
  }

  /* ── DOTS ── */
  .dot {
    position: absolute;
    width: 28px;
    height: 28px;
    border-radius: 50%;
    top: 50%;
    transform: translateY(-50%);
    will-change: transform, opacity, border-radius, width, height;
  }

  #dot-blue  { background: #4285F4; left: 85px;  }
  #dot-red   { background: #EA4335; left: 127px; }
  #dot-yellow{ background: #FBBC04; left: 169px; }
  #dot-green { background: #34A853; left: 211px; }

  /* ── SVG LOGO ── */
  .logo-svg {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    opacity: 0;
  }

  .cap {
    stroke-linecap: round;
    fill: none;
    stroke-width: 26;
  }
  .cap-outline {
    stroke: #2D2D2D;
    stroke-width: 34;
    fill: none;
    stroke-linecap: round;
  }

  #cap-blue   { stroke: #4285F4; }
  #cap-red    { stroke: #EA4335; }
  #cap-yellow { stroke: #FBBC04; }
  #cap-green  { stroke: #34A853; }
</style>
</head>
<body>

<div class="stage" id="stage">
  <!-- Bouncing Dots -->
  <div class="dot" id="dot-blue"></div>
  <div class="dot" id="dot-red"></div>
  <div class="dot" id="dot-yellow"></div>
  <div class="dot" id="dot-green"></div>

  <!-- GDG Logo SVG -->
  <svg class="logo-svg" id="logo-svg" viewBox="0 0 340 220" xmlns="http://www.w3.org/2000/svg">
    <!--
      GDG logo: two chevrons  <  >
      Left  < : blue  = top-right (148,72) → tip-left (88,110)
               red   = tip-left (88,110)  → bot-right (148,148)
      Right > : yellow = top-left (192,72) → tip-right (252,110)
               green  = tip-right(252,110) → bot-left  (192,148)
    -->

    <!--
      Left  <  :  blue  = top-right  (148, 72) → tip (88, 110)
                  red   = tip        (88, 110) → bot-right (148, 148)
      Right >  :  yellow = top-left  (192, 72) → tip (252, 110)
                  green  = tip       (252,110) → bot-left  (192, 148)

      Key: each arm goes FROM the open end TO/FROM the tip, so the
      two arms of each chevron share the same tip point — they never cross.
    -->

    <!-- Outlines (behind, thicker) -->
    <!-- Left <: blue goes top-right→tip, red goes bot-right→tip (both draw toward tip) -->
    <line class="cap-outline" id="cap-blue-out"   x1="148" y1="72"  x2="88"  y2="110"/>
    <line class="cap-outline" id="cap-red-out"    x1="148" y1="148" x2="88"  y2="110"/>
    <!-- Right >: yellow goes top-left→tip, green goes bot-left→tip -->
    <line class="cap-outline" id="cap-yellow-out" x1="192" y1="72"  x2="252" y2="110"/>
    <line class="cap-outline" id="cap-green-out"  x1="192" y1="148" x2="252" y2="110"/>

    <!-- Color strokes on top -->
    <line class="cap" id="cap-blue"   x1="148" y1="72"  x2="88"  y2="110"/>
    <line class="cap" id="cap-red"    x1="148" y1="148" x2="88"  y2="110"/>
    <line class="cap" id="cap-yellow" x1="192" y1="72"  x2="252" y2="110"/>
    <line class="cap" id="cap-green"  x1="192" y1="148" x2="252" y2="110"/>
  </svg>
</div>

<script>
// ─── Spring physics helper ───────────────────────────────────────────────────
function spring(from, to, stiffness = 180, damping = 20, mass = 1) {
  // Returns a function(t) → value using analytical spring
  const diff = to - from;
  const w0 = Math.sqrt(stiffness / mass);
  const zeta = damping / (2 * Math.sqrt(stiffness * mass));
  let fn;
  if (zeta < 1) {
    const wd = w0 * Math.sqrt(1 - zeta * zeta);
    fn = t => {
      const e = Math.exp(-zeta * w0 * t);
      return to - e * (diff * Math.cos(wd * t) + (diff * zeta * w0 / wd) * Math.sin(wd * t));
    };
  } else {
    fn = t => to - diff * Math.exp(-w0 * t) * (1 + w0 * t);
  }
  return fn;
}

// ─── Ease helpers ─────────────────────────────────────────────────────────────
const easeInOut = t => t < 0.5 ? 2*t*t : -1+(4-2*t)*t;
const easeOut   = t => 1 - Math.pow(1 - t, 3);
const easeIn    = t => t * t * t;

// ─── Animation runner ─────────────────────────────────────────────────────────
function animate(duration, tickFn, doneFn) {
  let start = null;
  function frame(ts) {
    if (!start) start = ts;
    const t = Math.min((ts - start) / duration, 1);
    tickFn(t);
    if (t < 1) requestAnimationFrame(frame);
    else if (doneFn) doneFn();
  }
  requestAnimationFrame(frame);
}

// ─── DOM refs ─────────────────────────────────────────────────────────────────
const dots = {
  blue:   document.getElementById('dot-blue'),
  red:    document.getElementById('dot-red'),
  yellow: document.getElementById('dot-yellow'),
  green:  document.getElementById('dot-green'),
};
const logoSvg = document.getElementById('logo-svg');
const caps = {
  blue:   document.getElementById('cap-blue'),
  red:    document.getElementById('cap-red'),
  yellow: document.getElementById('cap-yellow'),
  green:  document.getElementById('cap-green'),
  'blue-out':   document.getElementById('cap-blue-out'),
  'red-out':    document.getElementById('cap-red-out'),
  'yellow-out': document.getElementById('cap-yellow-out'),
  'green-out':  document.getElementById('cap-green-out'),
};

// Get stage bounding client rect to convert absolute px → relative stage coords
const stage = document.getElementById('stage');

// ─── Dot initial center positions (px from stage left/top) ───────────────────
// CSS: left + width/2, top = 50% of 220 = 110
const dotHome = {
  blue:   { x: 85  + 14, y: 110 },
  red:    { x: 127 + 14, y: 110 },
  yellow: { x: 169 + 14, y: 110 },
  green:  { x: 211 + 14, y: 110 },
};

// ─── Logo capsule midpoints — match SVG coords ───────────────────────────────
// blue:   (148,72)→(88,110)   mid=(118,91)
// red:    (88,110)→(148,148)  mid=(118,129)
// yellow: (192,72)→(252,110)  mid=(222,91)
// green:  (252,110)→(192,148) mid=(222,129)
const capTarget = {
  blue:   { x: 118, y: 91  },
  red:    { x: 118, y: 129 },
  yellow: { x: 222, y: 91  },
  green:  { x: 222, y: 129 },
};

// ─── Set stroke-dasharray for draw animation ──────────────────────────────────
function capLength(id) {
  const el = caps[id];
  try { return el.getTotalLength(); } catch(e) {
    const dx = parseFloat(el.getAttribute('x2')) - parseFloat(el.getAttribute('x1'));
    const dy = parseFloat(el.getAttribute('y2')) - parseFloat(el.getAttribute('y1'));
    return Math.sqrt(dx*dx + dy*dy);
  }
}
const COLOR_KEYS = ['blue','red','yellow','green'];
const lengths = {};
COLOR_KEYS.forEach(k => {
  lengths[k] = capLength(k);
  [caps[k], caps[k+'-out']].forEach(el => {
    el.style.strokeDasharray  = lengths[k];
    el.style.strokeDashoffset = lengths[k]; // hidden
  });
});

// ─── Utility: set dot transform from stage-local px coords ───────────────────
function setDotPos(key, x, y, scale = 1) {
  const d = dots[key];
  const cx = dotHome[key].x; // original CSS left + 14
  const cy = dotHome[key].y;
  const dx = x - cx;
  const dy = y - cy;
  d.style.transform = `translateY(-50%) translate(${dx}px, ${dy}px) scale(${scale})`;
}

function resetDotPos(key) {
  dots[key].style.transform = 'translateY(-50%)';
}

// ─── PHASE 1: Bouncing dots ───────────────────────────────────────────────────
let bounceRAF = null;
let bounceActive = false;

function startBounce(duration, onDone) {
  bounceActive = true;
  const delays = { blue: 0, red: 0.15, yellow: 0.30, green: 0.45 };
  const amp = 32;
  let start = null;

  function frame(ts) {
    if (!start) start = ts;
    const elapsed = (ts - start) / 1000;

    COLOR_KEYS.forEach(k => {
      const t = elapsed - delays[k];
      if (t < 0) return;
      // elastic bounce: sin with exponential envelope for "settling"
      const freq = 2.8;
      const decay = 1.2;
      const bounce = -Math.abs(Math.sin(Math.PI * t * freq)) * amp * Math.exp(-decay * t);
      setDotPos(k, dotHome[k].x, dotHome[k].y + bounce);
    });

    if (elapsed < duration) {
      bounceRAF = requestAnimationFrame(frame);
    } else {
      bounceActive = false;
      // reset to center
      COLOR_KEYS.forEach(k => resetDotPos(k));
      if (onDone) onDone();
    }
  }
  bounceRAF = requestAnimationFrame(frame);
}

// ─── PHASE 2: Morph dots → logo ───────────────────────────────────────────────
function morphToLogo(onDone) {
  // Show SVG (transparent until caps draw)
  logoSvg.style.opacity = '1';

  // Dots fly to their target positions and shrink
  const DUR = 700; // ms
  const stagger = { blue: 0, red: 80, yellow: 50, green: 130 };

  let finished = 0;
  COLOR_KEYS.forEach(k => {
    setTimeout(() => {
      const from = { x: dotHome[k].x, y: dotHome[k].y };
      const to   = capTarget[k];
      const springX = spring(from.x, to.x, 220, 22);
      const springY = spring(from.y, to.y, 220, 22);
      animate(DUR, t => {
        const st = Math.min(t * (DUR / (DUR - stagger[k])), 1);
        const sx = springX(st * 0.9);
        const sy = springY(st * 0.9);
        const scale = 1 - easeIn(t) * 0.9;
        setDotPos(k, sx, sy, scale);
      }, () => {
        dots[k].style.opacity = '0';
        finished++;
        if (finished === 4) {
          // Draw caps
          drawCaps(onDone);
        }
      });
    }, stagger[k]);
  });
}

function drawCaps(onDone) {
  const DUR = 500;
  const stagger2 = { blue: 0, red: 60, yellow: 40, green: 100 };
  let finished = 0;
  COLOR_KEYS.forEach(k => {
    setTimeout(() => {
      const len = lengths[k];
      animate(DUR, t => {
        const v = len * (1 - easeOut(t));
        caps[k].style.strokeDashoffset = v;
        caps[k+'-out'].style.strokeDashoffset = v;
      }, () => {
        finished++;
        if (finished === 4 && onDone) onDone();
      });
    }, stagger2[k]);
  });
}

// ─── PHASE 3: Logo hold ────────────────────────────────────────────────────────
function holdLogo(duration, onDone) {
  setTimeout(onDone, duration);
}

// ─── PHASE 4: Unmorph logo → dots ─────────────────────────────────────────────
function unmorphToDots(onDone) {
  // Undraw caps
  const DUR_UNDRAW = 400;
  const stagger3 = { blue: 100, red: 40, yellow: 60, green: 0 };
  let finished = 0;
  COLOR_KEYS.forEach(k => {
    setTimeout(() => {
      const len = lengths[k];
      animate(DUR_UNDRAW, t => {
        const v = len * easeIn(t);
        caps[k].style.strokeDashoffset = v;
        caps[k+'-out'].style.strokeDashoffset = v;
      }, () => {
        finished++;
        if (finished === 4) emergeDots(onDone);
      });
    }, stagger3[k]);
  });
}

function emergeDots(onDone) {
  logoSvg.style.opacity = '0';
  const DUR = 650;
  const stagger4 = { blue: 0, red: 70, yellow: 40, green: 110 };
  let finished = 0;

  COLOR_KEYS.forEach(k => {
    const d = dots[k];
    d.style.opacity = '1';
    setTimeout(() => {
      const from = capTarget[k];
      const to   = dotHome[k];
      const springX = spring(from.x, to.x, 200, 18);
      const springY = spring(from.y, to.y, 200, 18);
      animate(DUR, t => {
        const sx = springX(t * 0.9);
        const sy = springY(t * 0.9);
        const scale = easeOut(t);
        setDotPos(k, sx, sy, scale);
      }, () => {
        resetDotPos(k);
        finished++;
        if (finished === 4 && onDone) onDone();
      });
    }, stagger4[k]);
  });
}

// ─── MAIN LOOP ─────────────────────────────────────────────────────────────────
function loop() {
  // Reset state
  COLOR_KEYS.forEach(k => {
    dots[k].style.opacity = '1';
    resetDotPos(k);
    caps[k].style.strokeDashoffset = lengths[k];
    caps[k+'-out'].style.strokeDashoffset = lengths[k];
  });
  logoSvg.style.opacity = '0';

  // Phase 1: bounce for 2.2s
  startBounce(2.2, () => {
    // Phase 2: morph
    morphToLogo(() => {
      // Phase 3: hold 1.2s
      holdLogo(1200, () => {
        // Phase 4: unmorph
        unmorphToDots(() => {
          // Pause then loop
          setTimeout(loop, 400);
        });
      });
    });
  });
}

// Kick off after a short delay
setTimeout(loop, 300);
</script>
</body>
</html>
